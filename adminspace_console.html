<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ADMINSPACE Terminal</title>
    <link rel="icon" href="favicon.ico">
	<link href="style.css" rel="stylesheet" type="text/css" media="all">
	<!-- -->
    <style>
        body {
			background-image: url("backgrounds/adminspace.png"); 
            margin: 0;
            padding: 0;
            font-family: "VoidFont", monospace; 
            color: white;
			image-rendering: pixelated;
        }
        
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .background-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .input-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;  
            align-items: center;
            padding: 20px;
        }

        .text-box {
            background: rgba(0,0,0,0.75);
			border: 1px solid #d60000f;
			color: #fff;
			padding: 10px 16px;
			border-radius: 6px;
			font-family: 'VoidFont', monospace;
			font-size: 14px;
			width: 256px;
        }
        
        .warning {
            font-size: 18px;
            color: #c20000;
            background-color: #ffffff;
        } 
        .admin-id {
            font-size: 18px;
            color: green;
            background-color: #ffffff;
        } 

        .send-btn {
			font-family: 'VoidFont', monospace;
            font-size: 18px;
            padding: 5px 10px;
            cursor: pointer;
            background-color: #888888;
            color: white;
            margin-top: 5px;
        }
        
        .center-img {
            width: 150px;     
            height: auto;
            margin-bottom: 10px;
        }
        
        .gui-img {
            margin-top: 10px;
            width: 500px;
            height: 500px;
        }
        
        .log-area {
            margin-top: 10px;
            width: 340px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            font-size: 16px;
            color: #ffffff;
        }

        .log-area p {
            margin: 5px 0;
        }
		
		.area-img {
			width: 400px;
			position: absolute;
			top: 20%;
			right: 35%;
		}
		
		#admin {
			
		}
    </style>

</head>
<body>

<audio id="music" src="soundtracks/inverse_tesseract.ogg" autoplay loop></audio>
	<script>
		document.addEventListener('click', function() {
		const music = document.getElementById('music');
		if (music.paused) music.play();
		}, { once: false });
	</script>
	<script>
		const isMobile = window.innerWidth <= 768;
		document.head.insertAdjacentHTML('beforeend', `<style> ${isMobile ? ` .log-area { width: 330px; } ` : `.text {  } `}</style>`);
	</script>

<div class="container">
	<p id="admin"></p>
    <img class="area-img" src="images/console/adminspacegui.png" alt="ConsoleGUI">
    <div class="input-area">
       <!-- src="images/console/adminspaceconsole.png" class="center-img" alt="AdminspaceTerminal"-->
       <input type="text" id="userInput" class="text-box" placeholder="e ADMINSPACE Command">
       <button class="send-btn" onclick="sendText()">Execute</button>
       <p>Output dei comandi:</p>
       <div class="log-area" id="logArea"></div>
    </div>
</div>


<script src="scripts/console/adminconsolerispostev2.js"></script>

<script src="scripts/console/adminconsolemain.js"></script>

</body>
</html>
