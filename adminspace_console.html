<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ADMINSPACE Terminal</title>
    <link rel="icon" href="favicon.ico">
	<link href="style.css" rel="stylesheet" type="text/css" media="all">
	<!-- -->
    <style>
        body {
			background-image: url("backgrounds/adminspace.png"); 
			background-size: cover;
			background-position: center; 
			background-attachment: fixed; 
			color: white;
			font-family: "VoidFont", monospace;
			image-rendering: pixelated;
        }
        
        .container {
            position: absolute;
			top: 50%;
			right: 45%;
        }

        .background-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .input-area {
            position: absolute;
            top: 50%;
            left: 63%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;  
            align-items: center;
            padding: 20px;
        }

        .text-box {
            background: rgba(0,0,0,0.75);
			border: 1px solid #d60000f;
			color: #fff;
			padding: 10px 16px;
			border-radius: 6px;
			font-family: 'VoidFont', monospace;
			font-size: 14px;
			width: 256px;
        }
        
        .warning {
            font-size: 18px;
            color: #c20000;
            background-color: #ffffff;
        } 
        .admin-id {
            font-size: 18px;
            color: green;
            background-color: #ffffff;
        } 

        .send-btn {
			font-family: 'VoidFont', monospace;
            font-size: 18px;
            padding: 5px 10px;
            cursor: pointer;
            background-color: #888888;
            color: white;
            margin-top: 5px;
        }
        
        .center-img {
            width: 150px;     
            height: auto;
            margin-bottom: 10px;
        }
        
        .gui-img {
            margin-top: 10px;
            width: 500px;
            height: 500px;
        }
        
        .log-area {
            margin-top: 10px;
            width: 340px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            font-size: 16px;
            color: #ffffff;
        }

        .log-area p {
            margin: 5px 0;
        }
		
		.area-img {
			width: 400px;
			position: absolute;
			top: -180px;
			left: -100px;
		}
		
		#admin {
			
		}
		
		.yes {
			font-family: 'VoidFont', monospace;
            font-size: 30px;
            padding: 5px 10px;
            cursor: pointer;
            background-color: #888888;
            color: white;
            margin-top: 5px;
			position: relative;
			z-index: 10;
			left: 40%;
			bottom: 170px;
        }
		.no {
			font-family: 'VoidFont', monospace;
            font-size: 30px;
            padding: 5px 10px;
            cursor: pointer;
            background-color: #888888;
            color: white;
            margin-top: 5px;
			position: relative;
			z-index: 10;
			left: -11%;
			bottom: 110px;
        }
		#title1 {
			position: relative;
			z-index: 10;
			bottom: 190px;
			right: 90px;
			color: black;
		}
		#title2 {
			z-index: 2;
			position: relative;
			z-index: 10;
			bottom: 190px;
			right: 90px;
			color: black;
		}
		#ver {
			z-index: 2;
			position: relative;
			z-index: 10;
			bottom: 225px;
			right: -230px;
			color: black;
		}
		#proceed {
			z-index: 2;
			position: relative;
			z-index: 10;
			bottom: 160px;
			right: -65px;
			color: black;
		}
    </style>

</head>
<body>

<audio id="music" src="soundtracks/inverse_tesseract.ogg" autoplay loop></audio>
	<script>
		document.addEventListener('click', function() {
		const music = document.getElementById('music');
		if (music.paused) music.play();
		}, { once: false });
	</script>
	<script>
		const isMobile = window.innerWidth <= 768;
		document.head.insertAdjacentHTML('beforeend', `<style> ${isMobile ? ` .log-area { width: 330px; } ` : `.text {  } `}</style>`);
	</script>

<a class="adminlink" href="adminspace.html">Torna alla Home</a>
<div class="container">
	<div class="title">
		<p id="title1">adminspace</p>
		<p id="title2">Adminspace Console</p>
		<p id="ver">v2.0.84</p>
	</div>
	<div id="main">
		<img class="area-img" src="images/console/adminspacegui.png" alt="ConsoleGUI">
		<div class="input-area">
		<!-- src="images/console/adminspaceconsole.png" class="center-img" alt="AdminspaceTerminal"-->
		<input type="text" id="userInput" class="text-box" placeholder="e ADMINSPACE Command">
		<button class="send-btn" onclick="sendText()">Execute</button>
		<p>Output dei comandi:</p>
		<div class="log-area" id="logArea"></div>
		</div>
	</div>
	<div id="confirm">
		<p id="proceed">Proceed?</p>
		<button class="yes" onclick="yes()">Yes</button>
		<button class="no" onclick="no()">No</button>
		<img class="area-img" src="images/console/gui.png" alt="ConsoleGUI">
	</div>
</div>


<script src="scripts/console/adminconsolerispostev2.js"></script>
<script src="scripts/console/adminconsolemain.js"></script>

<!-- BASI DI ADMINSPACE -->
	<div id="overlay">
		<div id="logintext">
			<p>Per accedere a questa pagina è necessario un AdminCode</p>
			<button class="btn" onclick="redirect()">Accedi</button>
		</div>
	</div>
	<div id="book"></div>
	<script src="scripts/book.js"></script>
	<div id="admin-desc">
		<p id="admin-name">Accesso eseguito da: </p>
		<button onclick="apriLibreria()" class="library"><img src="images/book.png" class="mini-book">Libreria</button>
		<button class="logout" onclick="location.href='index.html'">Logout</button>
	</div>
	<div class="admin">
		<img id="frame" src="images/admin_frame.png" alt="Admin Logo Frame">
		<img id="admin-icon" src="admins/blank.png" alt="Admin Logo">
	</div>
	
	<script src="scripts/main.js"></script>
<!-- FINE DELLE BASI DI ADMINSPACE-->
</body>
</html>
