<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminSPACE - Home Page</title>
    <!--placeholder-->
    <link href="style.css" rel="stylesheet" type="text/css" media="all">
    <link rel="icon" href="favicon.ico">
    <style>
      body {
        background-image: url("backgrounds/adminspace.png"); 
        background-size: cover;
        background-position: center; 
        background-attachment: fixed; 
        color: white;
        font-family: "VoidFont", monospace;
      }
      .text {
        background: rgba(20,20,20,0.8);
        border: 2px solid #d60000;
        border-radius: 6px;
        padding: 5px 10px;
        width: 700px;
        margin-bottom: 10px;
      }
	  
	  #logo {
		width: 670px;
	  }
	  
	  .adminlink {
		position: relative;
		display: inline-block;
	}

	.adminlink::after {
		content: '';
		position: absolute;
		inset: 0;
		background: rgba(124, 0, 255, 0.4);
		opacity: 0;
		transition: opacity 0.2s;
	}

	.adminlink:hover::after {
		opacity: 1;
	}
      
    </style>
  </head>
  <body>
  
  <div class="text">
  
	<script>
		const isMobile = window.innerWidth <= 768;
		document.head.insertAdjacentHTML('beforeend', `<style> ${isMobile ? ` .text { width: 330px; } #logo { width: 320px; } ` : `.text {  } `}</style>`);
	</script>
    
    <audio id="music" src="soundtracks/saw_13_returns.ogg" autoplay loop></audio>
     
    <img id="logo" src="images/adminspacelogo.png" alt="Adminspace Logo Full">
	
	<h1>AdminSPACE</h1>
	
	<p>Su questo sito potete accedere a Consoles, WorkZones, Documenti e molto altro ancora</p>
	
	<p>---Consoles Disponibili---</p>
	<a class="adminlink" href="console.html">
		<img src="images/console/consolelogo.png" class="center-img" alt="Console Terminal" width=64px>
	</a>
	<a class="adminlink" href="adminspace_console.html">
		<img src="images/console/adminspaceconsolelogo.png" class="center-img" alt="AdminSPACE Console" width=64px>
	</a>

    <p>- Il team di Grejang</p>
    
    <p> - Adam</p>
	
  </div>
  
	<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

	<div id="model-container"></div>
	<script src="scripts/model.js"></script>
	
	<!-- BASI DI ADMINSPACE -->
	<div id="overlay">
		<div id="logintext">
			<p>Per accedere a questa pagina è necessario un AdminCode</p>
			<button class="btn" onclick="redirect()">Accedi</button>
		</div>
	</div>
	<div id="admin-desc">
		<p id="admin-name">Accesso eseguito da: </p>
		<button class="logout" onclick="location.href='index.html'">Logout</button>
	</div>
	<div class="admin">
		<img id="frame" src="images/admin_frame.png" alt="Admin Logo Frame">
		<img id="admin-icon" src="admins/blank.png" alt="Admin Logo">
	</div>
	
	<script src="scripts/main.js"></script>
  </body>
</html>
