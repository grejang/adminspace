<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>AdminSPACE - Console Terminal</title>
    <link rel="icon" href="favicon.ico">
	<link href="style.css" rel="stylesheet" type="text/css" media="all">
	<!-- Placeholder-->
    <style>
        body {
			background-image: url("backgrounds/sky4_sphere.png"); 
			background-size: cover;
			background-position: center; 
			background-attachment: fixed; 
			color: white;
			font-family: "VoidFont", monospace;
        }
        
        .container {
            position: absolute;
			top: 50%;
			right: 50%;
        }

        .background-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .input-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;  
            align-items: center;
            padding: 20px;
        }

        .text-box {
            background: rgba(0,0,0,0.75);
			border: 1px solid #d60000f;
			color: #fff;
			padding: 10px 16px;
			border-radius: 6px;
			font-family: 'VoidFont', monospace;
			font-size: 14px;
			width: 256px;
        }

        .send-btn {
			font-family: 'VoidFont', monospace;
            font-size: 18px;
            padding: 5px 10px;
            cursor: pointer;
            background-color: #888888;
            color: white;
            margin-top: 5px;
        }
        
        .center-img {
            width: 150px;     
            height: auto;
            margin-bottom: 10px;
        }
        
        .log-area {
            margin-top: 10px;
            width: 300px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            font-size: 16px;
            color: #ffffff;
        }

        .log-area p {
            margin: 5px 0;
        }
		
		#link {
			position: absolute;
			top: 0px;
			left: 0px;
		}
    </style>

</head>
<body>

<audio id="music" src="soundtracks/voidexp.ogg" autoplay loop></audio>
	<script>
		document.addEventListener('click', function() {
		const music = document.getElementById('music');
		if (music.paused) music.play();
		}, { once: false });
	</script>
	<script>
		const isMobile = window.innerWidth <= 768;
		document.head.insertAdjacentHTML('beforeend', `<style> ${isMobile ? ` .log-area { width: 330px; } ` : `.text {  } `}</style>`);
	</script>
	<a id="link" href="index.html">Torna alla Home</a>
<div class="container">
    <div class="input-area">
       <img src="images/console/console.png" class="center-img" alt="Terminal">
       <input type="text" id="userInput" class="text-box" placeholder="Type RAW command">
       <button class="send-btn" onclick="sendText()">Execute</button>
       <p>Output dei comandi:</p>
       <div class="log-area" id="logArea"></div>
    </div>
</div>


<script src="scripts/console/consolerisposte.js"></script>

<script src="scripts/console/consolemain.js"></script>

<!-- BASI DI ADMINSPACE -->
	<div id="overlay">
		<div id="logintext">
			<p>Per accedere a questa pagina è necessario un AdminCode</p>
			<button class="btn" onclick="redirect()">Accedi</button>
		</div>
	</div>
	<div id="admin-desc">
		<p id="admin-name">Accesso eseguito da: </p>
		<button class="logout" onclick="location.href='index.html'">Logout</button>
	</div>
	<div class="admin">
		<img id="frame" src="images/admin_frame.png" alt="Admin Logo Frame">
		<img id="admin-icon" src="admins/blank.png" alt="Admin Logo">
	</div>
	
	<script src="scripts/main.js"></script>
</body>
</html>
