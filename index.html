<!DOCTYPE html>

<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminSPACE</title>
    <!--placeholder-->
    <link href="style.css" rel="stylesheet" type="text/css" media="all">
    <link rel="icon" href="favicon.ico">
    <style>
      body {
        background-image: url("backgrounds/adminspace_main.png"); 
        background-size: cover;
        background-position: center; 
        background-attachment: fixed; 
        color: white;
        font-family: "VoidFont", monospace;
      }
      .text {
        background: rgba(20,20,20,0.8);
        border: 2px solid #d60000;
        border-radius: 6px;
        padding: 5px 10px;
        width: 700px;
        margin-bottom: 10px;
      }
	  #logo {
		width: 670px;
	  }
	  
	.btn {
		background: #d60000;
		color: #fff;
		border: none;
		padding: 10px 24px;
		border-radius: 2px;
		font-family: 'VoidFont', monospace;
		font-size: 14px;
		cursor: pointer;
		transition: background 0.2s;
		width: 256px;
	}

	.btn:hover {
		background: #d43737;
	}
      
    </style>
  </head>
  <body>
  
  <div class="text">
    
    <audio id="music" src="soundtracks/sixteen_pointed_asterisk.ogg" autoplay loop></audio>
	<script>
		document.addEventListener('click', function() {
		const music = document.getElementById('music');
		if (music.paused) music.play();
		}, { once: false });
	</script>
	
	<script>
      const isMobile = window.innerWidth <= 768;
      document.head.insertAdjacentHTML('beforeend', `<style>
        ${isMobile ? ` .text { width: 360px; } #logo { width: 350px; }` : `.text {  } `}</style>`);
    </script>
     
    <img id="logo" src="images/adminspacelogo.png" alt="Adminspace Logo Full">
	
	<p>Benvenuti ad AdminSPACE</p>
	
	<p>Eseguite l'accesso con un 'ADMINCODE' per accedere a AdminSPACE</p>
	
	<button class="btn" onclick="location.href='adminspacelogin.html?redirect=adminspace'">Accedi</button>

    <p>- Il team di Grejang</p>
    
    <p> - Adam</p>
  </div>
  </body>
</html>
